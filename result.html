<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinPlanner Result</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="result">
    <main class="stage">
      <aside class="brand-panel" aria-label="Arah visual">
        <div class="brand-pill"><span class="brand-dot"></span> Recommendation Reveal</div>
        <h1>Your Match</h1>
        <p>Reveal profile dan pilihan manual jika rekomendasi belum cocok.</p>
      </aside>
      <section class="phone-shell" aria-label="Mobile app preview">
        <div class="app">
          <section class="screen">
            <div class="topbar">
              <a class="icon-btn" href="quiz.html" aria-label="Kembali">&#8249;</a>
              <button class="skip-btn" type="button" id="restartQuiz">Ulangi</button>
            </div>
            <div class="content reveal-content">
              <div class="result-card">
                <span class="badge">Financial Profile Match</span>
                <div class="profile-medal" id="profileMedal" data-logo="balance" aria-hidden="true"><span></span></div>
                <h2 class="result-title" id="resultBadge"></h2>
                <p class="method-name" id="resultMethod"></p>
              </div>
              <p class="lede" id="resultCopy"></p>
              <button class="primary-btn" type="button" id="previewBudget">Preview auto-budget -></button>
              <p class="manual-choice-note">Kalau profile ini kurang cocok, kamu bisa pilih metode budgeting lain secara manual di bawah.</p>
              <div class="method-grid" id="methodGrid" aria-label="Pilih profile lain"></div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
