<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinPlanner Result</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="result">
    <main class="stage">
      <aside class="brand-panel" aria-label="Arah visual">
        <div class="brand-pill"><span class="brand-dot"></span> Recommendation Reveal</div>
        <h1>Your Match</h1>
        <p>Reveal profile dan pilihan manual jika rekomendasi belum cocok.</p>
      </aside>
      <section class="phone-shell" aria-label="Mobile app preview">
        <div class="app">
          <section class="screen">
            <div class="topbar">
              <a class="icon-btn" href="quiz.html" aria-label="Kembali">&#8249;</a>
              <button class="skip-btn" type="button" id="restartQuiz">Ulangi</button>
            </div>
            <div class="content reveal-content">
              <div class="result-card">
                <span class="badge">Financial Profile Match</span>
                <div class="profile-medal" id="profileMedal" aria-hidden="true">
                  <img class="badge-svg" id="profileMedalImg" alt="" />
                </div>
                <h2 class="result-title" id="resultBadge"></h2>
                <p class="method-name" id="resultMethod"></p>
              </div>
              <p class="lede" id="resultCopy"></p>
              <div class="reveal-helper" aria-label="Ganti metode budgeting">
                <span>Kurang cocok?</span>
                <button class="text-btn" type="button" data-open-sheet="method">Ganti metode</button>
              </div>
            </div>
            <div class="bottom-dock">
              <button class="primary-btn" type="button" id="previewBudget">Preview auto-budget -></button>
            </div>
            <div class="sheet-backdrop" data-sheet="method" aria-hidden="true">
              <div class="bottom-sheet" role="dialog" aria-modal="true" aria-labelledby="methodSheetTitle">
                <button class="sheet-close" type="button" data-close-sheet aria-label="Tutup">&times;</button>
                <span class="sheet-handle"></span>
                <div class="sheet-head">
                  <span>Recommendation</span>
                  <h3 id="methodSheetTitle">Pilih metode</h3>
                </div>
                <div class="method-grid" id="methodGrid" aria-label="Pilih metode budgeting"></div>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
