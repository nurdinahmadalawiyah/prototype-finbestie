<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Budgetin Auto Budget</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="budget-preview">
    <main class="stage">
      <aside class="brand-panel" aria-label="Arah visual">
        <div class="brand-pill"><span class="brand-dot"></span> Auto-Budget Preview</div>
        <h1>No Blank State</h1>
        <p>Kategori dan limit awal dibuat otomatis berdasarkan metode pilihan user.</p>
      </aside>
      <section class="phone-shell" aria-label="Mobile app preview">
        <div class="app">
          <section class="screen">
            <div class="topbar">
              <a class="icon-btn" href="result.html" aria-label="Kembali">&#8249;</a>
              <span aria-hidden="true"></span>
            </div>
            <div class="content budget-content">
              <span class="quiz-count">Auto-Budget Setup</span>
              <h2 class="quiz-title">Masukin income bulanan.</h2>
              <p class="lede" id="budgetIntro"></p>
              <div class="budget-income-card" aria-label="Monthly income">
                <span>Monthly income</span>
                <p class="income-sub">Pakai income bersih per bulan biar auto-budget kamu lebih pas.</p>
                <div class="income-row">
                  <span class="income-prefix" aria-hidden="true">Rp</span>
                  <input
                    class="income-input"
                    id="monthlyIncome"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="0"
                    aria-label="Nominal income bulanan"
                  />
                </div>
                <div class="income-presets" aria-label="Preset income">
                  <button class="preset-chip" type="button" data-income="5000000">5 jt</button>
                  <button class="preset-chip" type="button" data-income="8000000">8 jt</button>
                  <button class="preset-chip" type="button" data-income="12000000">12 jt</button>
                </div>
                <small class="income-help">Bisa kamu ubah kapan aja setelah masuk dashboard.</small>
              </div>
            </div>
            <div class="bottom-dock">
              <button class="primary-btn" id="budgetContinue" type="button" disabled>Lanjut ke dashboard</button>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
