<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinBestie Auth</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="auth">
    <main class="stage">
      <aside class="brand-panel" aria-label="Arah visual">
        <div class="brand-pill"><span class="brand-dot"></span> Auth Screen</div>
        <h1>Sign In</h1>
        <p>Login sederhana dengan Google atau masuk sebagai guest untuk mencoba quiz.</p>
      </aside>
      <section class="phone-shell" aria-label="Mobile app preview">
        <div class="app">
          <section class="screen">
            <div class="topbar auth-topbar"></div>
            <div class="content auth-content">
              <div class="auth-visual" aria-hidden="true">
                <div class="auth-pass">
                  <strong>Smart<br />Budget</strong>
                  <span class="auth-float one">Rp</span>
                  <span class="auth-float two">%</span>
                </div>
              </div>
              <div class="auth-hero">
                <h2>Masuk dulu, bestie.</h2>
                <p>Biar template budget, goals, dan gold tracker kamu tersimpan rapi tanpa mulai dari nol.</p>
              </div>
              <div class="auth-options" aria-label="Pilihan masuk">
                <button class="google-btn" type="button" data-start-quiz>
                  <span class="google-mark" aria-hidden="true">
                    <svg viewBox="0 0 24 24" role="img" focusable="false">
                      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                      <path fill="#FBBC05" d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.84z" />
                      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06L5.84 9.9C6.71 7.31 9.14 5.38 12 5.38z" />
                    </svg>
                  </span>
                  Continue with Google
                </button>
                <button class="guest-btn" type="button" data-start-quiz>Continue as guest</button>
              </div>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
