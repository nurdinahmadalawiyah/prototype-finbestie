<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e3d1e"/>
      <stop offset="100%" stop-color="#0a180a"/>
    </radialGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6fcf6f" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6fcf6f" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Hexagon base -->
  <polygon points="100,6 186,52 186,148 100,194 14,148 14,52"
    fill="url(#bg)" stroke="#3a7a3a" stroke-width="2"/>

  <!-- Glow fill -->
  <polygon points="100,6 186,52 186,148 100,194 14,148 14,52"
    fill="url(#glowCenter)"/>

  <!-- Inner hex ring -->
  <polygon points="100,18 174,58 174,142 100,182 26,142 26,58"
    fill="none" stroke="#4a9a4a" stroke-width="1" opacity="0.5"/>

  <!-- Enso (zen circle) - open brush stroke -->
  <circle cx="100" cy="95" r="42" fill="none" stroke="#2d5a2d" stroke-width="3" opacity="0.4"/>
  <path d="M100 53 A42 42 0 1 1 68 116"
    fill="none" stroke="#7fdf7f" stroke-width="4"
    stroke-linecap="round" filter="url(#glow)"/>

  <!-- 5-petal sakura flower -->
  <g transform="translate(100,95)" filter="url(#glow)">
    <ellipse cx="0" cy="-15" rx="6" ry="10" fill="#b0f0b0" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="-15" rx="6" ry="10" fill="#b0f0b0" opacity="0.9" transform="rotate(72)"/>
    <ellipse cx="0" cy="-15" rx="6" ry="10" fill="#b0f0b0" opacity="0.9" transform="rotate(144)"/>
    <ellipse cx="0" cy="-15" rx="6" ry="10" fill="#b0f0b0" opacity="0.9" transform="rotate(216)"/>
    <ellipse cx="0" cy="-15" rx="6" ry="10" fill="#b0f0b0" opacity="0.9" transform="rotate(288)"/>
    <circle cx="0" cy="0" r="6" fill="#5abf5a"/>
    <circle cx="0" cy="0" r="3" fill="#d0ffd0"/>
  </g>

  <!-- Hex vertex dots -->
  <circle cx="100" cy="6"   r="3.5" fill="#4a9a4a"/>
  <circle cx="186" cy="52"  r="3.5" fill="#4a9a4a"/>
  <circle cx="186" cy="148" r="3.5" fill="#4a9a4a"/>
  <circle cx="100" cy="194" r="3.5" fill="#4a9a4a"/>
  <circle cx="14"  cy="148" r="3.5" fill="#4a9a4a"/>
  <circle cx="14"  cy="52"  r="3.5" fill="#4a9a4a"/>
</svg>
