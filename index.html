<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FinPlanner Onboarding</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="onboarding">
    <main class="stage">
      <aside class="brand-panel" aria-label="Arah visual">
        <div class="brand-pill"><span class="brand-dot"></span> Mobile HTML Prototype</div>
        <h1>FinPlanner</h1>
        <p>Prototype onboarding, auth, quiz rekomendasi, reveal profile, dan auto-budget preview.</p>
        <div class="palette" aria-label="Color palette">
          <span class="swatch" style="background: var(--sage)"></span>
          <span class="swatch" style="background: var(--ink)"></span>
          <span class="swatch" style="background: var(--coral)"></span>
          <span class="swatch" style="background: var(--violet)"></span>
          <span class="swatch" style="background: var(--mint)"></span>
        </div>
      </aside>
      <section class="phone-shell" aria-label="Mobile app preview">
        <div class="app">
          <section class="screen">
            <div class="topbar intro-topbar">
              <div class="progress-row" id="introDots" aria-label="Onboarding progress"></div>
            </div>
            <div class="content intro-content">
              <div class="hero-art" id="introArt" data-art="cashflow">
                <div class="money-poster" aria-hidden="true"></div>
              </div>
              <h2 class="big-title" id="introTitle"></h2>
              <p class="lede" id="introCopy"></p>
            </div>
            <div class="bottom-dock intro-actions">
              <button class="secondary-btn" type="button" id="introLeft">Skip</button>
              <button class="primary-btn" type="button" id="introNext" aria-label="Next">-&gt;</button>
            </div>
          </section>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
